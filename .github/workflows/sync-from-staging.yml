name: Sync from Staging

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show diff only, no PR)'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout prod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: prod

      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          repository: Khai5/UptimeMonitor_Staging
          token: ${{ secrets.STAGING_PAT }}
          fetch-depth: 0
          path: staging

      - name: Sync files from staging to prod
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --delete \
            staging/ prod/

      - name: Check for changes
        id: changes
        working-directory: prod
        run: |
          git diff --stat
          COUNT=$(git diff --name-only | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          {
            echo "files<<EOF"
            git diff --name-only
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Nothing to sync
        if: steps.changes.outputs.count == '0'
        run: echo "Prod is already up to date with staging."

      - name: Dry run summary
        if: steps.changes.outputs.count != '0' && inputs.dry_run == 'true'
        working-directory: prod
        run: |
          echo "=== DRY RUN: ${{ steps.changes.outputs.count }} file(s) would change ==="
          git diff --stat

      - name: Commit and push sync branch
        if: steps.changes.outputs.count != '0' && inputs.dry_run == 'false'
        id: push
        working-directory: prod
        run: |
          BRANCH="staging-sync-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Sync from staging"
          git push origin "$BRANCH"

      - name: Open PR
        if: steps.changes.outputs.count != '0' && inputs.dry_run == 'false'
        working-directory: prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.push.outputs.branch }}" \
            --title "Promote staging to prod (${{ steps.changes.outputs.count }} file(s) changed)" \
            --body "## Staging sync

          Files changed:
          \`\`\`
          ${{ steps.changes.outputs.files }}
          \`\`\`

          Review the diff and merge when ready."
